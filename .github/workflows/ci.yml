name: ci
on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: web

      - uses: actions/checkout@v4
        with:
          repository: aquascape-studio/aquascape-botany
          path: botany

      - uses: actions/checkout@v4
        with:
          repository: aquascape-studio/aquascape-ui
          path: ui

      - uses: actions/checkout@v4
        with:
          repository: aquascape-studio/aquascape-render
          path: render

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: web/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build @aquascape-studio/botany
        working-directory: botany/js
        run: pnpm install --no-frozen-lockfile && pnpm build

      - name: Build @aquascape-studio/ui
        working-directory: ui
        run: pnpm install --no-frozen-lockfile && pnpm build

      - name: Build @aquascape-studio/render
        working-directory: render
        run: pnpm install --no-frozen-lockfile && pnpm build

      - name: Wire local packages into web
        working-directory: web
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            pkg.dependencies['@aquascape-studio/botany'] = 'file:../botany/js';
            pkg.dependencies['@aquascape-studio/ui'] = 'file:../ui';
            pkg.dependencies['@aquascape-studio/render'] = 'file:../render';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "
          pnpm install --no-frozen-lockfile

      - run: pnpm typecheck
        working-directory: web

      - run: pnpm build
        working-directory: web
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Prepare Docker context
        if: github.ref == 'refs/heads/main'
        run: |
          mkdir -p docker-ctx/.next
          cp -r web/.next/standalone/. docker-ctx/
          cp -r web/.next/static docker-ctx/.next/static
          cp -r web/public docker-ctx/public
          cp web/Dockerfile.ci docker-ctx/Dockerfile

      - name: Upload Docker context
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: docker-ctx
          path: docker-ctx/
          retention-days: 1

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment: dev
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_DEV }}
          aws-region: us-east-1

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Download Docker context
        uses: actions/download-artifact@v4
        with:
          name: docker-ctx
          path: docker-ctx/

      - name: Build and push image
        run: |
          IMAGE_URI=063418083301.dkr.ecr.us-east-1.amazonaws.com/aquascape-web-dev
          docker build -t "$IMAGE_URI:${{ github.sha }}" -t "$IMAGE_URI:latest" docker-ctx/
          docker push "$IMAGE_URI:${{ github.sha }}"
          docker push "$IMAGE_URI:latest"

      - name: Update ECS task definition and deploy
        run: |
          IMAGE_URI=063418083301.dkr.ecr.us-east-1.amazonaws.com/aquascape-web-dev
          # Build a new task definition revision: swap image, drop the nginx command override.
          NEW_TASK_DEF=$(aws ecs describe-task-definition \
              --task-definition aquascape-web-dev \
              --region us-east-1 \
              --query 'taskDefinition' --output json | \
            jq --arg IMG "$IMAGE_URI:${{ github.sha }}" '
              del(.taskDefinitionArn,.revision,.status,.requiresAttributes,
                  .placementConstraints,.compatibilities,.registeredAt,.registeredBy) |
              .containerDefinitions[0].image = $IMG |
              del(.containerDefinitions[0].command)
            ')
          NEW_ARN=$(aws ecs register-task-definition \
            --cli-input-json "$NEW_TASK_DEF" \
            --region us-east-1 \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          aws ecs update-service \
            --cluster aquascape-dev \
            --service aquascape-web-dev \
            --task-definition "$NEW_ARN" \
            --force-new-deployment \
            --region us-east-1
